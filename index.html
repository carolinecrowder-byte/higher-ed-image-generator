<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whopathon Graphic Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #FA4616;
  --midnight: #141212;
  --snow: #FCF6F5;
  --bg-main: #141212;
  --bg-card: #1C1917;
  --bg-input: #242020;
  --border: rgba(255,255,255,0.1);
  --text: #FCF6F5;
  --muted: rgba(252,246,245,0.5);
  --r: 12px;
}
body { font-family:'Space Grotesk',sans-serif; background:var(--bg-main); color:var(--text); min-height:100vh; padding:24px; }

.header { display:flex; align-items:center; gap:14px; margin-bottom:28px; }
.logo-box { background:var(--orange); border-radius:10px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.logo-box svg { width:28px; height:28px; }
.header h1 { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; }
.header p { font-size:13px; color:var(--muted); margin-top:2px; }

.layout { display:grid; grid-template-columns:340px 1fr; gap:24px; align-items:start; }

.sidebar { display:flex; flex-direction:column; gap:14px; }
.panel { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.panel-hd { padding:11px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.panel-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.panel-title { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.panel-body { padding:14px 16px; display:flex; flex-direction:column; gap:11px; }

label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
input[type="text"], textarea {
  width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:13px; padding:8px 11px; outline:none; transition:border-color 0.2s;
}
input[type="text"]:focus, textarea:focus { border-color:var(--orange); }
textarea { resize:vertical; min-height:52px; line-height:1.5; }

.whop-swatches { display:flex; gap:8px; }
.wswatch {
  flex:1; padding:9px 6px; border-radius:8px; border:2px solid transparent;
  cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px;
  transition:border-color 0.2s;
}
.wswatch:hover { border-color:rgba(255,255,255,0.3); }
.wswatch.active { border-color:white; }
.wswatch-circle { width:28px; height:28px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); }
.wswatch-lbl { font-size:10px; font-weight:700; letter-spacing:0.3px; text-transform:uppercase; color:var(--muted); text-align:center; }

.hex-row { display:flex; gap:8px; align-items:flex-end; }
.hex-row input[type="text"] { font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:1px; }
.hex-preview { width:38px; height:38px; border-radius:8px; border:1px solid var(--border); flex-shrink:0; cursor:pointer; transition:transform 0.15s; }
.hex-preview:hover { transform:scale(1.05); }
input[type="color"] { width:0; height:0; opacity:0; position:absolute; }

.fmt-row { display:flex; gap:8px; }
.fmt-btn {
  flex:1; padding:8px 6px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:11px; font-weight:700;
  cursor:pointer; transition:all 0.2s; font-family:'Space Grotesk',sans-serif; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
.fmt-btn:hover { border-color:var(--orange); color:var(--text); }
.fmt-btn.active { background:var(--orange); border-color:var(--orange); color:white; }
.fmt-icon { font-size:15px; line-height:1; }
.fmt-dim { font-size:10px; opacity:0.65; }

.card-tabs { display:flex; gap:6px; flex-wrap:wrap; }
.tab-btn {
  flex:1; min-width:58px; padding:7px 4px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:10px; font-weight:700;
  cursor:pointer; transition:all 0.2s; font-family:'Space Grotesk',sans-serif; text-align:center;
}
.tab-btn:hover { border-color:var(--orange); color:var(--text); }
.tab-btn.active { background:var(--orange); border-color:var(--orange); color:white; }

.action-btn {
  width:100%; padding:11px; border-radius:10px; border:none; cursor:pointer;
  font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700;
  transition:opacity 0.2s, transform 0.15s;
}
.action-btn:hover { opacity:0.88; transform:translateY(-1px); }
.action-btn:active { transform:translateY(0); }
.btn-primary { background:var(--orange); color:white; }
.btn-secondary { background:var(--bg-input); color:var(--text); border:1px solid var(--border); }

.logo-upload {
  width:100%; height:52px; border-radius:8px; background:var(--bg-input);
  border:1px dashed var(--border); display:flex; align-items:center; justify-content:center;
  font-size:12px; color:var(--muted); overflow:hidden; position:relative; cursor:pointer;
}
.logo-upload img { max-height:40px; max-width:100%; object-fit:contain; }
.logo-upload input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.logo-clear { font-size:11px; color:var(--orange); cursor:pointer; margin-top:4px; display:none; }
.toggle-row { display:flex; align-items:center; gap:8px; }
.toggle-row input[type="checkbox"] { accent-color:var(--orange); width:14px; height:14px; cursor:pointer; }
.toggle-row label { margin:0; cursor:pointer; font-size:12px; color:var(--muted); }

.preview-area { display:flex; flex-direction:column; gap:14px; }
.preview-label { display:flex; align-items:center; justify-content:space-between; }
.preview-label span { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; font-weight:700; }
.preview-label small { font-size:11px; color:var(--muted); }
.graphic-frame { width:100%; border-radius:14px; overflow:hidden; }

#graphic-canvas {
  width:100%; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:flex-start;
}
.gc-grid { position:absolute; inset:0; }
.gc-glow { position:absolute; border-radius:50%; pointer-events:none; }
.gc-bar { position:absolute; top:0; left:0; right:0; height:3px; }
.gc-badge { position:absolute; z-index:3; font-family:'Space Grotesk',sans-serif; }
.gc-uni { position:absolute; z-index:3; }
.gc-content { position:relative; z-index:2; width:100%; }
.gc-eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:500; margin-bottom:10px; }
.gc-title { font-family:'Space Mono',monospace; font-weight:700; line-height:1.05; margin-bottom:6px; }
.gc-sub { font-size:13px; margin-bottom:20px; line-height:1.5; }
.gc-date-box { display:inline-flex; align-items:center; gap:10px; border-radius:10px; padding:10px 16px; border:1px solid; }
.gc-date-txt { font-size:14px; font-weight:700; }
.gc-big-num { font-family:'Space Mono',monospace; font-size:72px; font-weight:700; line-height:1; margin-bottom:2px; }
.gc-unit-lbl { font-family:'Space Mono',monospace; font-size:15px; letter-spacing:4px; text-transform:uppercase; margin-bottom:16px; }
.gc-stats { display:flex; gap:10px; flex-wrap:wrap; }
.gc-stat { border-radius:8px; padding:10px 14px; border:1px solid; text-align:center; }
.gc-stat-n { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; line-height:1; }
.gc-stat-l { font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-top:3px; }
.gc-checks { display:flex; flex-direction:column; gap:8px; }
.gc-check { display:flex; align-items:center; gap:10px; font-size:13px; }
.gc-check-box { width:17px; height:17px; border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; border:1px solid; }
.gc-progress { position:absolute; bottom:0; left:0; right:0; height:3px; }
.gc-progress-fill { height:100%; }
.gc-pulse { width:8px; height:8px; border-radius:50%; animation:pulse 1.2s infinite; flex-shrink:0; display:inline-block; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

.mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.mini-card { cursor:pointer; border-radius:8px; overflow:hidden; border:2px solid transparent; transition:border-color 0.2s; }
.mini-inner { display:flex; align-items:center; justify-content:center; position:relative; }

@media(max-width:900px){ .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">
    <svg viewBox="0 0 24 24" fill="none"><path d="M4 6L8.5 18L12 10L15.5 18L20 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div>
    <h1>WHOPATHON</h1>
    <p>Event graphic generator 脗路 Brand kit edition</p>
  </div>
</div>

<div class="layout">
<div class="sidebar">

  <!-- Graphic type + format -->
  <div class="panel">
    <div class="panel-hd"><div class="panel-dot" style="background:var(--orange)"></div><span class="panel-title">Graphic type</span></div>
    <div class="panel-body">
      <div>
        <label>Card</label>
        <div class="card-tabs">
          <button class="tab-btn active" onclick="setCard('savedate',0)">Save the Date</button>
          <button class="tab-btn" onclick="setCard('week',1)">1 Week Left</button>

      </div>
      <div>
        <label>Format</label>

            <span class="fmt-icon">芒聳卢</span>Landscape<span class="fmt-dim">1200脙聴628</span>
          </button>
          <button class="fmt-btn" onclick="setFormat('square',this)">
            <span class="fmt-icon">芒聳聽</span>Square<span class="fmt-dim">1080脙聴1080</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Copy editor -->
  <div class="panel">
    <div class="panel-hd"><div class="panel-dot" style="background:var(--orange)"></div><span class="panel-title">Edit copy</span></div>
    <div class="panel-body" id="copyFields" style="gap:10px"></div>
  </div>

  <!-- Whop brand: only orange / black / white -->

    <div class="panel-hd"><div class="panel-dot" style="background:var(--orange)"></div><span class="panel-title">Whop brand</span></div>
    <div class="panel-body">
      <label>Color theme</label>

          <span class="wswatch-lbl">Orange + Black</span>
        </div>
        <div class="wswatch" data-theme="mono" onclick="setTheme(this)">
          <div class="wswatch-circle" style="background:#FCF6F5;border-color:rgba(0,0,0,0.15)"></div>
          <span class="wswatch-lbl">Black + White</span>
        </div>
        <div class="wswatch" data-theme="snow" onclick="setTheme(this)">
          <div class="wswatch-circle" style="background:#FCF6F5;border-color:rgba(0,0,0,0.15)"></div>
          <span class="wswatch-lbl">White + Orange</span>
        </div>
      </div>
    </div>
  </div>

  <!-- University brand: HEX first -->
  <div class="panel">
    <div class="panel-hd"><div class="panel-dot" style="background:#6366F1"></div><span class="panel-title">University brand</span></div>
    <div class="panel-body">
      <div>
        <label>University name</label>
        <input type="text" id="uniName" placeholder="e.g. Michigan State University" oninput="render()">
      </div>
      <div>
        <label>Primary color HEX</label>
        <div class="hex-row">
          <input type="text" id="uni1Hex" value="#6366F1" maxlength="7" placeholder="#000000" oninput="onHex('uni1')">
          <div class="hex-preview" id="uni1Prev" style="background:#6366F1" onclick="document.getElementById('uni1Pick').click()" title="Open color picker"></div>
          <input type="color" id="uni1Pick" value="#6366F1" oninput="onPick('uni1',this.value)">
        </div>
      </div>
      <div>
        <label>Secondary color HEX</label>
        <div class="hex-row">
          <input type="text" id="uni2Hex" value="#A5B4FC" maxlength="7" placeholder="#000000" oninput="onHex('uni2')">
          <div class="hex-preview" id="uni2Prev" style="background:#A5B4FC" onclick="document.getElementById('uni2Pick').click()" title="Open color picker"></div>
          <input type="color" id="uni2Pick" value="#A5B4FC" oninput="onPick('uni2',this.value)">
        </div>
      </div>
      <div>
        <label>University logo (optional)</label>
        <div class="logo-upload" id="logoArea">
          <span id="logoPlaceholder">Click to upload logo</span>
          <img id="logoImg" style="display:none">
          <input type="file" accept="image/*" onchange="loadLogo(this)">
        </div>
        <span class="logo-clear" id="logoClear" onclick="clearLogo()">芒聹聲 Remove logo</span>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="showUni" checked onChange="render()">
        <label for="showUni">Show university branding on graphic</label>
      </div>
    </div>
  </div>

  <!-- Export -->
  <div class="panel">
    <div class="panel-hd"><div class="panel-dot" style="background:#22C55E"></div><span class="panel-title">Export</span></div>
    <div class="panel-body">
      <button class="action-btn btn-primary" id="dlBtn" onclick="exportPNG(event)">芒卢聡 Download this graphic</button>
      <button class="action-btn btn-secondary" id="dlAllBtn" onclick="exportAll(event)">芒卢聡 Download all 4 graphics</button>
    </div>
  </div>

</div><!-- /sidebar -->

<!-- PREVIEW -->
<div class="preview-area">
  <div class="preview-label">
    <span>Live preview</span>
    <small id="fmtLabel">1200 脙聴 628 脗路 Landscape</small>
  </div>
  <div class="graphic-frame">
    <div id="graphic-canvas">
      <div class="gc-grid" id="gcGrid"></div>
      <div class="gc-glow" id="glow1"></div>
      <div class="gc-glow" id="glow2"></div>
      <div class="gc-bar" id="gcBar"></div>
      <div class="gc-badge" id="gcBadge"></div>
      <div class="gc-uni" id="gcUni"></div>
      <div class="gc-content" id="gcContent"></div>
      <div class="gc-progress" id="gcProg" style="display:none"><div class="gc-progress-fill" id="gcProgFill"></div></div>
    </div>
  </div>
  <div>
    <div class="preview-label" style="margin-bottom:10px"><span>All 4 graphics</span></div>
    <div class="mini-grid" id="miniGrid"></div>
  </div>
</div>

</div><!-- /layout -->

function T() {
  const themes = {
    dark:  { bg:'#141212', primary:'#FA4616', text:'#FCF6F5', sub:'rgba(252,246,245,0.45)', grid:'rgba(255,255,255,0.04)', badgeBg:'#FA4616', badgeText:'#fff' },
    mono:  { bg:'#141212', primary:'#FCF6F5', text:'#FCF6F5', sub:'rgba(252,246,245,0.45)', grid:'rgba(255,255,255,0.04)', badgeBg:'#FCF6F5', badgeText:'#141212' },
    snow:  { bg:'#FCF6F5', primary:'#FA4616', text:'#141212', sub:'rgba(20,18,18,0.5)',      grid:'rgba(0,0,0,0.05)',       badgeBg:'#FA4616', badgeText:'#fff' },
  };
  return themes[S.theme];
}

function rgba(hex, a) {
  if (!hex || hex.length < 4) return `rgba(0,0,0,${a})`;
  let h = hex.replace('#','');
  if (h.length===3) h = h.split('').map(c=>c+c).join('');
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function buildCopyFields() {
  const defs = COPY_DEFS[S.card];
  document.getElementById('copyFields').innerHTML = defs.map(f => {
    const v = (S.copy[S.card][f.k]||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    return `<div>
      <label>${f.l}</label>
      ${f.ta
        ? `<textarea oninput="setCopy('${f.k}',this.value)">${S.copy[S.card][f.k]||''}</textarea>`
        : `<input type="text" value="${v}" oninput="setCopy('${f.k}',this.value)">`
      }
    </div>`;
  }).join('');
}
function setCopy(k, v) { S.copy[S.card][k] = v; render(); }

function loadLogo(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    S.uniLogo = e.target.result;
    document.getElementById('logoImg').src = e.target.result;
    document.getElementById('logoImg').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
    document.getElementById('logoClear').style.display = 'block';
    render();
  };
  r.readAsDataURL(f);
}
function clearLogo() {
  S.uniLogo = null;
  document.getElementById('logoImg').style.display = 'none';
  document.getElementById('logoPlaceholder').style.display = 'block';
  document.getElementById('logoClear').style.display = 'none';
  render();
}

function parseStats(raw) {
  return (raw||'').split(',').map(s => {
    const p = s.trim().split(' ');
    return { n: p[0]||'', l: p.slice(1).join(' ') };
  }).filter(s => s.n);
}

  // Grid

  // Accent bar

  // University branding (bottom right)

  uniEl.style.cssText = uniPos + 'text-align:right;z-index:3;position:absolute;';
  if (showUni && S.uniLogo) {
    uniEl.innerHTML = `<img src="${S.uniLogo}" style="max-height:32px;max-width:100px;object-fit:contain;display:block;margin-left:auto">`;

function renderMini() {
  const tk = T();
  const cards  = ['savedate','week','tomorrow','recap'];
  const labels = ['Save the Date','1 Week Left','Tomorrow','Wrap Up'];
  const sq = S.format === 'square';
  document.getElementById('miniGrid').innerHTML = cards.map((c,i) => `
    <div class="mini-card" style="border-color:${S.card===c?tk.primary:'transparent'}" onclick="setCard('${c}',${i})">
      <div class="mini-inner" style="background:${tk.bg};aspect-ratio:${sq?'1/1':'1.91/1'}">
        <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:28px 28px"></div>
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${tk.primary}"></div>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:${rgba(tk.text,0.5)};position:relative;z-index:1">${labels[i]}</span>
      </div>
    </div>`).join('');
}

async function exportPNG(e) {
  const btn = e.currentTarget;
  btn.textContent = 'Exporting...'; btn.disabled = true;
  try {
    const cvs = await html2canvas(document.getElementById('graphic-canvas'), { scale:2, useCORS:true, backgroundColor:T().bg, logging:false });
    const a = document.createElement('a');
    a.download = `whopathon-${S.card}-${S.format}.png`;
    a.href = cvs.toDataURL('image/png'); a.click();
  } catch(err) { alert('Export failed 芒聙聰 try a browser screenshot instead.'); }
  btn.textContent = '芒卢聡 Download this graphic'; btn.disabled = false;
}

async function exportAll(e) {
  const btn = e.currentTarget;
  btn.textContent = 'Exporting all...'; btn.disabled = true;
  const cards = ['savedate','week','tomorrow','recap'];
  const saved = S.card;
  for (const c of cards) {
    S.card = c; buildCopyFields(); render();
    await new Promise(r => setTimeout(r, 500));
    try {
      const cvs = await html2canvas(document.getElementById('graphic-canvas'), { scale:2, useCORS:true, backgroundColor:T().bg, logging:false });
      const a = document.createElement('a');
      a.download = `whopathon-${c}-${S.format}.png`;
      a.href = cvs.toDataURL('image/png'); a.click();
      await new Promise(r => setTimeout(r, 350));
    } catch(err) {}
  }
  S.card = saved; buildCopyFields(); render();
  btn.textContent = '芒卢聡 Download all 4 graphics'; btn.disabled = false;
}
